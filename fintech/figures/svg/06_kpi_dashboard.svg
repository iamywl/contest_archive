<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" font-family="-apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <rect width="1280" height="600" fill="#ffffff"/>

  <!-- Header -->
  <text x="80" y="76" font-size="28" font-weight="700" fill="#0f172a">초기 1년 정량 KPI (가설)</text>
  <text x="80" y="106" font-size="14" fill="#64748b">단위가 다른 4개 지표를 분리해 시각화</text>
  <line x1="80" y1="130" x2="1200" y2="130" stroke="#e2e8f0" stroke-width="1"/>

  <!-- 4 KPI cards -->
  <g transform="translate(80,170)">

    <!-- Card 1 -->
    <g>
      <rect x="0" y="0" width="260" height="220" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.5">KPI 01</text>
      <text x="20" y="58" font-size="14" font-weight="700" fill="#0f172a">가입자</text>
      <text x="20" y="120" font-size="44" font-weight="700" fill="#0f172a">5만 명</text>
      <text x="20" y="146" font-size="11" fill="#64748b">초기 1년 목표</text>
      <line x1="20" y1="160" x2="240" y2="160" stroke="#f1f5f9"/>
      <text x="20" y="184" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.5">BENCHMARK</text>
      <text x="20" y="202" font-size="12" fill="#475569">핀트 RA 가입자 37만 명 [S04]</text>
    </g>

    <!-- Card 2 -->
    <g transform="translate(280,0)">
      <rect x="0" y="0" width="260" height="220" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.5">KPI 02</text>
      <text x="20" y="58" font-size="14" font-weight="700" fill="#0f172a">월 시뮬레이션 실행</text>
      <text x="20" y="120" font-size="44" font-weight="700" fill="#0f172a">10만 건</text>
      <text x="20" y="146" font-size="11" fill="#64748b">월 평균 목표</text>
      <line x1="20" y1="160" x2="240" y2="160" stroke="#f1f5f9"/>
      <text x="20" y="184" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.5">BENCHMARK</text>
      <text x="20" y="202" font-size="12" fill="#475569">국내 상용 부재 [D11]</text>
    </g>

    <!-- Card 3 -->
    <g transform="translate(560,0)">
      <rect x="0" y="0" width="260" height="220" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.5">KPI 03</text>
      <text x="20" y="58" font-size="14" font-weight="700" fill="#0f172a">B2B 판매사 파일럿</text>
      <text x="20" y="120" font-size="44" font-weight="700" fill="#0f172a">MOU 1건</text>
      <text x="20" y="146" font-size="11" fill="#64748b">초기 1년 목표 (안전선)</text>
      <line x1="20" y1="160" x2="240" y2="160" stroke="#f1f5f9"/>
      <text x="20" y="184" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.5">BENCHMARK</text>
      <text x="20" y="202" font-size="12" fill="#475569">국내 RA 운영 17사+ [R04]</text>
    </g>

    <!-- Card 4 (highlighted) -->
    <g transform="translate(840,0)">
      <rect x="0" y="0" width="280" height="220" rx="10" fill="#0f172a"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1.5">KPI 04</text>
      <text x="20" y="58" font-size="14" font-weight="700" fill="#ffffff">XAI 설명 만족도</text>
      <text x="20" y="120" font-size="44" font-weight="700" fill="#ffffff">4.0 / 5.0</text>
      <text x="20" y="146" font-size="11" fill="#cbd5e1">사용성 테스트 n ≥ 300</text>
      <line x1="20" y1="160" x2="260" y2="160" stroke="#334155"/>
      <text x="20" y="184" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.5">BENCHMARK</text>
      <text x="20" y="202" font-size="12" fill="#cbd5e1">하나금융연구소 n=5,000 [D09]</text>
    </g>
  </g>

  <!-- Progress section -->
  <g transform="translate(80,440)" font-size="12" fill="#0f172a">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">PROGRESS · 0% (시작 전)</text>
    <line x1="0" y1="14" x2="120" y2="14" stroke="#cbd5e1"/>

    <g transform="translate(0,40)">
      <text x="0" y="14" font-size="11" fill="#475569">가입자</text>
      <rect x="100" y="6" width="900" height="6" rx="3" fill="#e2e8f0"/>
      <rect x="100" y="6" width="0" height="6" rx="3" fill="#0f172a"/>

      <text x="0" y="38" font-size="11" fill="#475569">월 시뮬</text>
      <rect x="100" y="30" width="900" height="6" rx="3" fill="#e2e8f0"/>
      <rect x="100" y="30" width="0" height="6" rx="3" fill="#0f172a"/>

      <text x="0" y="62" font-size="11" fill="#475569">B2B MOU</text>
      <rect x="100" y="54" width="900" height="6" rx="3" fill="#e2e8f0"/>
      <rect x="100" y="54" width="0" height="6" rx="3" fill="#0f172a"/>

      <text x="0" y="86" font-size="11" fill="#475569">XAI 만족도</text>
      <rect x="100" y="78" width="900" height="6" rx="3" fill="#e2e8f0"/>
      <rect x="100" y="78" width="0" height="6" rx="3" fill="#0f172a"/>
      <text x="1020" y="86" font-size="10" fill="#94a3b8">미측정 (지역예선 후 첫 측정)</text>
    </g>
  </g>

  <text x="80" y="588" font-size="11" fill="#94a3b8">본 KPI는 사업화 단계 가설이며 통합본선 단계에서 실측 갱신 예정</text>
</svg>
