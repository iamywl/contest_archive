      <rect x="520" y="0" width="240" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="540" y="32" font-size="14" font-weight="700" fill="#0f172a">XAI 요인 분해</text>
      <line x1="540" y1="44" x2="600" y2="44" stroke="#cbd5e1"/>
      <text x="540" y="68" font-size="11" fill="#475569">P5 손실 워터폴 (OAT)</text>
      <text x="540" y="100" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">FOUNDATION</text>
      <text x="540" y="118" font-size="11" fill="#334155">Lundberg–Lee [P17] · CFA [P05]</text>

