      <text x="20" y="40" font-size="11" fill="#64748b">디듀프 + 500 cap · 금소법 [R01] 사전 증빙</text>

      <rect x="420" y="0" width="400" height="50" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
      <text x="440" y="22" font-size="13" font-weight="700" fill="#0f172a">Admin XAI 내부 뷰</text>
      <text x="440" y="40" font-size="11" fill="#64748b">CFA 이해관계자별 분리 [P05] · 모델 메타데이터 공개</text>

      <rect x="840" y="0" width="400" height="50" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
      <text x="860" y="22" font-size="13" font-weight="700" fill="#0f172a">모델 메타데이터</text>
      <text x="860" y="40" font-size="11" fill="#64748b">SEC Reg BI [R06] AI-washing 대응 · 시드·상관 공개</text>
