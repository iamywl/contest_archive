      <text x="280" y="32" font-size="14" font-weight="700" fill="#0f172a">추천 리스트</text>
      <line x1="280" y1="44" x2="340" y2="44" stroke="#cbd5e1"/>
      <text x="280" y="68" font-size="11" fill="#475569">6차원 가중치 공개</text>
      <text x="280" y="86" font-size="11" fill="#475569">경고 심각도 분류</text>
      <text x="280" y="104" font-size="11" fill="#475569">투명한 점수 분해</text>

