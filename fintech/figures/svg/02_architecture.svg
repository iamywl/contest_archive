<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" font-family="-apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <rect width="1400" height="920" fill="#ffffff"/>

  <!-- Header -->
  <text x="80" y="76" font-size="28" font-weight="700" fill="#0f172a">RiskScope 시스템 아키텍처</text>
  <text x="80" y="106" font-size="14" fill="#64748b">사용자 → 코어 → 데이터 → 감사 4계층 · 모든 코어 엔진은 학술 정전 위에 구축</text>
  <line x1="80" y1="130" x2="1320" y2="130" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Layer 1 — User -->
