      <text x="20" y="46" font-size="11" fill="#64748b">SPY · QQQ · KODEX · ELS · TDF · 채권 · 예금 · ISA · 차이나 EV · ACWI</text>

      <rect x="420" y="0" width="400" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-dasharray="4 3"/>
      <text x="440" y="26" font-size="13" font-weight="700" fill="#0f172a">FRED / BOK ECOS / KRX 파이프라인</text>
      <text x="440" y="46" font-size="11" fill="#64748b">현재 스텁 · S8 실연동 예정</text>

      <rect x="840" y="0" width="400" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-dasharray="4 3"/>
      <text x="860" y="26" font-size="13" font-weight="700" fill="#0f172a">마이데이터 2.0 [R02]</text>
      <text x="860" y="46" font-size="11" fill="#64748b">현재 모의 5계좌 · S8 실연동 예정</text>
