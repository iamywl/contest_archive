      <line x1="20" y1="44" x2="80" y2="44" stroke="#cbd5e1"/>
      <text x="20" y="68" font-size="11" fill="#475569">설문 6차원</text>
      <text x="20" y="86" font-size="11" fill="#475569">연령·소득·자산·목표</text>
