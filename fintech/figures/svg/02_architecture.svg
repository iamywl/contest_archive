      <text x="800" y="100" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">EVIDENCE</text>
      <text x="800" y="118" font-size="11" fill="#334155">Bergstresser [P19] · Schwab [R06]</text>

