      <text x="1060" y="68" font-size="11" fill="#475569">인플레이션 ÷ T</text>
      <text x="1060" y="100" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">CONTEXT</text>
      <text x="1060" y="118" font-size="11" fill="#334155">금융이해력 56.6점 [D01]</text>
